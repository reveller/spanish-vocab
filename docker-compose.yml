services:
  app:
    build: .
    ports:
      - "5050:5050"
    volumes:
      - vocab-data:/data
    environment:
      - DATABASE_PATH=/data/vocab.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  vocab-data:
